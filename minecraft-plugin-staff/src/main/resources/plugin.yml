name: MostlyVanillaStaff
version: ${project.version}
main: com.mostlyvanilla.staff.MostlyVanillaStaff
api-version: '1.20'
description: Staff management GUI panel for Mostly Vanilla

commands:
  staff:
    description: Open the staff management panel for a player
    usage: /staff <player>
    permission: mv.staff
  wipe:
    description: Wipe all data for a player (op only)
    usage: /wipe <player>
  mute:
    description: Mute a player for a duration
    usage: /mute <player> <duration> [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  ban:
    description: Ban a player with a preset or custom reason
    usage: /ban <player> <reason>
  banreason:
    description: Manage preset ban reasons (op only)
    usage: /banreason <add|remove|list>

permissions:
  mv.staff:
    description: Access the staff panel
    default: true
  mv.mute:
    description: Use /mute and /unmute
    default: false
