name: MostlyVanillaStaff
version: ${project.version}
main: com.mostlyvanilla.staff.MostlyVanillaStaff
api-version: '1.20'
description: Staff management GUI panel for Mostly Vanilla

commands:
  staff:
    description: Open the staff management panel for a player
    usage: /staff <player>
    permission: mv.staff
  wipe:
    description: Wipe all data for a player (op only)
    usage: /wipe <player>
  mute:
    description: Mute a player for a duration
    usage: /mute <player> <duration> [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  ban:
    description: Ban a player with a preset or custom reason
    usage: /ban <player> <reason>
  banreason:
    description: Manage preset ban reasons (op only)
    usage: /banreason <add|remove|list>
  banlist:
    description: List all banned players
    usage: /banlist [page]
  bancheck:
    description: Check ban info for a player
    usage: /bancheck <player>
  unban:
    description: Unban a player
    usage: /unban <player>
  invsee:
    description: View a player's inventory
    usage: /invsee <player>
  checkec:
    description: View a player's ender chest
    usage: /checkec <player>
  regenworld:
    description: Delete all terrain in overworld, nether, and end then restart (op only)
    usage: /regenworld
  globalwipe:
    description: Wipe all player data for every player who has ever joined (op only)
    usage: /globalwipe
  transfer:
    description: Transfer all data from one player to another (op only)
    usage: /transfer <from> <to>

permissions:
  mv.staff:
    description: Access the staff panel
    default: true
  mv.mute:
    description: Use /mute and /unmute
    default: false
