# -------------------------------------------------------
#   Mostly Vanilla โ€” TAB Scoreboard
#
#   Requires:
#     - TAB plugin (https://github.com/NEZNAMY/TAB)
#     - PlaceholderAPI
#     - MostlyVanillaEconomy plugin (provides %economy_* placeholders)
#
#   To install:
#     1. Replace the 'scoreboard' block in plugins/TAB/config.yml
#        with the block below.
#     2. Merge the 'animations' block into plugins/TAB/animations.yml
#        (add sb_title and sb_separator entries).
#     3. Set a main currency in-game: /eco setmain <currency>
#     4. Reload TAB: /tab reload
#
#   Toggle command in-game: /sb
# -------------------------------------------------------

# โ”€โ”€ Paste into plugins/TAB/config.yml โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€โ”€
scoreboard:
  enabled: true
  toggle-command: /sb
  remember-toggle-choice: true
  hidden-by-default: false
  delay-on-join-milliseconds: 500
  scoreboards:
    default:
      title: "%animation:sb_title%"
      display-condition: "ALWAYS"
      lines:
        - "%animation:sb_separator%"
        - "   &a&lMostly Vanilla"
        - "%animation:sb_separator%"
        - " "
        - " &a&lBalance"
        - "  &e%economy_balance%"
        - "  &2%economy_currency%"
        - "  "
        - " &a&lWorld"
        - "  &f%world%"
        - "   "
        - " &a&lPing"
        - "  &f%ping%&8ms"
        - "    "
        - " &7mc.mostlyvanilla.net"


