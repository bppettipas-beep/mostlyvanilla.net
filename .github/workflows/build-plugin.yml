name: Build Minecraft Plugin

on:
  push:
    branches: [main]
    paths:
      - 'minecraft-plugin/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -f minecraft-plugin/pom.xml package -DskipTests

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: MostlyVanillaVerify
          path: minecraft-plugin/target/mostly-vanilla-verify-*.jar
          retention-days: 30
