name: Build Minecraft Plugins

on:
  push:
    branches: [main]
    paths:
      - 'minecraft-plugin-verify/**'
      - 'minecraft-plugin-economy/**'
  workflow_dispatch:

jobs:
  build-verify:
    name: Build Verify Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -f minecraft-plugin-verify/pom.xml package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MostlyVanillaVerify
          path: minecraft-plugin-verify/target/mostly-vanilla-verify-*.jar
          retention-days: 30

  build-economy:
    name: Build Economy Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -f minecraft-plugin-economy/pom.xml package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MostlyVanillaEconomy
          path: minecraft-plugin-economy/target/mostly-vanilla-economy-*.jar
          retention-days: 30
