name: MostlyVanillaAnnouncement
version: ${project.version}
main: com.mostlyvanilla.announcement.MostlyVanillaAnnouncement
api-version: '1.20'
description: Role-restricted server-wide title announcements

commands:
  announcement:
    description: Broadcast a large title announcement to all players
    usage: /announcement <message> [| subtitle]
    aliases: [announce, ann]

permissions:
  mv.announcement:
    description: Send server-wide title announcements
    default: false
