name: MostlyVanillaTpa
version: ${project.version}
main: com.mostlyvanilla.tpa.MostlyVanillaTpa
api-version: '1.20'
description: Custom TPA plugin for Mostly Vanilla

commands:
  tpa:
    description: Request to teleport to a player
    usage: /tpa <player>
  tpahere:
    description: Request a player to teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: Accept a pending teleport request
    usage: /tpaccept
  tpdeny:
    description: Deny a pending teleport request
    usage: /tpdeny
  tpacancel:
    description: Cancel your outgoing teleport request
    usage: /tpacancel
