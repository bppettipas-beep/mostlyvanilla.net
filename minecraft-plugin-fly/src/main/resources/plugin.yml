name: MostlyVanillaFly
version: ${project.version}
main: com.mostlyvanilla.fly.MostlyVanillaFly
api-version: '1.20'
description: Role-restricted flight toggle for Mostly Vanilla

commands:
  fly:
    description: Toggle flight for yourself or another player
    usage: /fly [player]

permissions:
  mv.fly:
    description: Use /fly on yourself (also granted via role)
    default: false
  mv.fly.other:
    description: Use /fly on other players
    default: op
