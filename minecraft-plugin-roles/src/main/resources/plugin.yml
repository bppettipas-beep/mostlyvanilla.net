name: MostlyVanillaRoles
version: ${project.version}
main: com.mostlyvanilla.roles.MostlyVanillaRoles
api-version: 1.20
description: Role system with chat prefixes for Mostly Vanilla
authors:
  - MostlyVanilla
softdepend:
  - TAB

commands:
  role:
    description: Manage player roles
    usage: /role <create|delete|assign|remove|list|info>
  duty:
    description: Toggle on/off duty status to enable or disable staff permissions
    usage: /duty
  dutyrequire:
    description: Set which role threshold must use /duty before using staff commands
    usage: /dutyrequire <role|disable>
  spawnstash:
    description: Spawn a personal stash room at your location
    usage: /spawnstash
  delstash:
    description: Remove your personal stash room and restore the original blocks
    usage: /delstash
  spawnore:
    description: Spawn an ore vein of your choice at your location
    usage: /spawnore <ore>
  delore:
    description: Remove all ore blocks you spawned with /spawnore and restore original blocks
    usage: /delore
  history:
    description: View a player's sell, auction house, and order history
    usage: /history <player>

permissions:
  mostlyvanilla.roles.admin:
    description: Manage roles
    default: op
