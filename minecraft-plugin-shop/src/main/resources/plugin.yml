name: MostlyVanillaShop
version: ${project.version}
main: com.mostlyvanilla.shop.MostlyVanillaShop
api-version: '1.20'
commands:
  shop:
    description: Open the Mostly Vanilla shop
    usage: /shop [reload]
  sell:
    description: Open the sell GUI — place items and close to sell them
    usage: /sell [reload]
  worth:
    description: Browse item sell prices
    usage: /worth
  bitshop:
    description: Open the Bit Shop — spend bits on spawners and crate keys
    usage: /bitshop
