      - {weight: 15, material: GOLD_INGOT,    amount: 8,   name: "&6x8 Gold Ingots"}
      - {weight: 10, material: DIAMOND,       amount: 1,   name: "&bDiamond"}
      - {weight: 5,  material: EMERALD,       amount: 1,   name: "&aEmerald"}

