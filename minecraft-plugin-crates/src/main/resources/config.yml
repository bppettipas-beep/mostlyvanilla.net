# Each crate type needs a matching key ID from MostlyVanillaShop's bit shop.
# Rewards are chosen by weighted random roll — higher weight = more likely.

crate-types:
  iron:
    display-name: "&fIron Crate"
    key-type: iron
    rewards:
      - {weight: 40, material: IRON_INGOT,   amount: 32,  name: "&7x32 Iron Ingots"}
